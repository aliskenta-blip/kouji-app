<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>見積管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Meiryo',sans-serif;background:#c8c8c8;font-size:12px;color:#333}
.hdr{background:#222;color:#fff;padding:4px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hdr h1{font-size:13px}.hdr-btns{display:flex;gap:3px}
.hdr-btns button{padding:4px 8px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;border-radius:4px;font-size:10px;cursor:pointer;font-family:inherit}
.sidebar{position:fixed;left:0;top:28px;width:170px;background:#fff;height:calc(100vh - 28px);border-right:1px solid #bbb;overflow-y:auto;z-index:100;padding:6px}
.sidebar h3{font-size:10px;color:#333;margin:4px 0 2px;border-bottom:1px solid #ddd;padding-bottom:2px}
.sb-item{padding:5px;border-radius:4px;cursor:pointer;font-size:11px;margin-bottom:1px}.sb-item:hover{background:#eee}.sb-item.on{background:#333;color:#fff}
.sb-item .a{font-size:10px;color:#1565c0;font-weight:700}.sb-item.on .a{color:#90caf9}
.sb-add{padding:5px;border-radius:4px;cursor:pointer;font-size:11px;color:#555;border:1px dashed #aaa;text-align:center;margin-top:3px}
.main{margin-left:170px;padding:10px;display:flex;flex-direction:column;align-items:center}
.page{width:297mm;height:210mm;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.3);margin-bottom:10px;position:relative;overflow:hidden;page-break-after:always}
.page input[type=text],.page input[type=date],.page input[type=number]{border:none;border-bottom:1px solid transparent;padding:1px 2px;font-family:inherit;font-size:inherit;background:transparent;outline:none;width:100%}
.page input:hover{border-bottom-color:#bbb}.page input:focus{border-bottom-color:#1565c0;background:#f8f9ff}
.det{width:100%;border-collapse:collapse;font-size:11px}
.det th{background:#333;color:#fff;padding:4px 6px;font-size:10px;text-align:center;border:1px solid #555;font-weight:600}
.det td{border:1px solid #aaa;padding:0;height:21px;vertical-align:middle}
.det td input{border:none;padding:2px 4px;font-size:11px;font-family:inherit;width:100%;height:100%;background:transparent;outline:none}
.det td input:focus{background:#f0f4ff}.det td.ni input{text-align:right}
.det td.am{text-align:right;padding:2px 4px;font-size:11px;font-weight:700;background:#fafafa}
.det .ft td{font-weight:700;background:#f0f0f0;border-top:2px solid #333}
.rd{background:none;border:none;color:#c62828;cursor:pointer;font-size:12px;padding:0 2px;opacity:0}tr:hover .rd{opacity:1}
@media print{.hdr,.sidebar,.no-print,.rd{display:none!important}.main{margin-left:0;padding:0}.page{box-shadow:none;margin:0;width:100%;height:auto}.page input{border-bottom:none!important}body{background:#fff}@page{size:A4 landscape;margin:5mm}}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0}.page{width:100%;height:auto}}
</style></head><body>

const SK='kouji_estimate';
function ld(){try{const d=localStorage.getItem(SK);if(d)D=JSON.parse(d);}catch(e){}}

function saveNotes(){const e=cur();if(!e)return;const lines=[];for(let i=1;i<=5;i++){const el=document.getElementById('note'+i);lines.push(el?el.value:'');}e.notes=lines.join('\n');sv();}

function uL(i,f,v){const e=cur();if(!e)return;e.lines[i][f]=v;sv();}
function rc(i){const e=cur();if(!e)return;const l=e.lines[i];l.am=Math.round(fn(l.pr)*fn(l.qt));sv();renderAll();}
function cr(i){const e=cur();if(!e)return;e.lines[i]={nm:'',sp:'',qt:'',un:'',pr:'',am:0,bk:''};sv();renderAll();}
function ap(){const e=cur();if(!e)return;for(let i=0;i<ROWS;i++)e.lines.push({nm:'',sp:'',qt:'',un:'',pr:'',am:0,bk:''});sv();renderAll();}
