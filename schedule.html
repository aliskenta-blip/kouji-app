<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>工程管理表</title>
<style>
:root{--pri:#1b5e20;--nav:#1f4e79;--nav2:#2e75b6;--bg:#f4f6f8;--bill-cols:2;--bill-font-scale:1}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Hiragino Sans','Meiryo',sans-serif;background:var(--bg);font-size:13px;color:#333;-webkit-user-select:none;user-select:none}
.hdr{background:var(--nav);color:#fff;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:10px;flex-wrap:wrap}
.hdr h1{font-size:15px;letter-spacing:2px}
.hdr-btns{display:flex;gap:8px;align-items:center}
.hdr-btns button{padding:8px 14px;border:1.5px solid rgba(255,255,255,.5);background:rgba(255,255,255,.22);color:#fff;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:background .15s,transform .08s,box-shadow .15s;line-height:1}
.hdr-btns button:hover{background:rgba(255,255,255,.38);box-shadow:0 2px 6px rgba(0,0,0,.18)}
.hdr-btns button:active{transform:scale(.96)}
.hdr-btns .hb-icon{font-size:20px;line-height:1}
.hdr-btns .hb-label{font-size:12px;letter-spacing:1px}
@media (max-width:520px){.hdr-btns .hb-label{display:none}.hdr-btns button{padding:8px 10px}}
.tabs{display:flex;background:var(--nav2)}
.tab{padding:7px 18px;color:rgba(255,255,255,.7);cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;border-bottom:3px solid transparent}
.tab.on{color:#fff;border-bottom-color:#fff;background:rgba(255,255,255,.1)}
.panel{display:none}.panel.on{display:block}
.toolbar{background:#fff;padding:6px 12px;border-bottom:1px solid #e0e0e0;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.toolbar select,.toolbar input{padding:5px 8px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit}
.toolbar button{padding:5px 12px;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:700;font-family:inherit}
.btn-g{background:#2e7d32;color:#fff}.btn-b{background:#1565c0;color:#fff}.btn-o{background:#e65100;color:#fff}.btn-x{background:#eee;color:#333}
.btn-done{background:#ff6f00;color:#fff;border:none;padding:2px 8px;border-radius:4px;font-size:10px;cursor:pointer;font-weight:700;font-family:inherit;white-space:nowrap}
.btn-done.on{background:#c62828;box-shadow:inset 0 0 0 2px #ffeb3b}
.btn-deki{background:#1565c0;color:#fff;border:none;padding:2px 8px;border-radius:4px;font-size:10px;cursor:pointer;font-weight:700;font-family:inherit;white-space:nowrap}
.btn-deki.on{background:#0d47a1;box-shadow:inset 0 0 0 2px #ffeb3b}
.btn-del{background:none;border:none;color:#c62828;cursor:pointer;font-size:13px;padding:0 3px;font-weight:700}
.action-btns{display:inline-flex;align-items:center;gap:3px;margin-left:6px;vertical-align:middle}
.task-name-text{cursor:pointer}
.task-name-text.s-done{color:var(--c-done,#e53935);font-weight:700}
.task-name-text.s-deki{color:var(--c-deki,#1565c0);font-weight:700}
.legend{background:#fff;padding:4px 12px;border-bottom:1px solid #e0e0e0;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;padding:3px 8px;border-radius:6px;border:1px solid #e0e0e0}
.legend-item .dot{width:14px;height:14px;border-radius:3px}
.legend-add{border:1px dashed #aaa;padding:3px 10px;border-radius:6px;font-size:11px;cursor:pointer;color:#888}
.sch-wrap{overflow:auto;max-height:calc(100vh - 140px);position:relative;-webkit-overflow-scrolling:touch}
.sch-wrap.middle-dragging{cursor:grabbing!important}
.sch-table{border-collapse:collapse;font-size:12px;width:100%}
.sch-table th,.sch-table td{border:1px solid #ccc;padding:0;text-align:center;white-space:nowrap}
.sch-table th{background:var(--nav);color:#fff;position:sticky;top:0;z-index:10;font-weight:600;font-size:11px}
.sch-table th.month-hdr{background:#37474f;font-size:14px;letter-spacing:2px;padding:4px 0}
.sch-table th.dow{font-size:10px;height:20px}
.sch-table th.dow.sat{color:#aadcff}.sch-table th.dow.sun,.sch-table th.dow.hol{color:#ffaaaa}
.sch-table th.day-num{font-size:11px;height:22px;min-width:28px}
.sch-table th.day-num.sat{background:#1a3a5c}.sch-table th.day-num.sun,.sch-table th.day-num.hol{background:#5c1a1a}.sch-table th.day-num.today{background:#e65100}
/* 横スクロール時、左ヘッダーは JS で transform 同期（CSS sticky-left は使わない） */
.sch-table th.left-hdr{position:sticky;top:0;z-index:15;background:#37474f;padding:0 4px;will-change:transform}
.sch-table th.top-left{position:sticky;top:0;z-index:14;background:#37474f;will-change:transform}
.sch-table td.task-name{position:sticky;left:0;z-index:5;background:#fff;text-align:left;padding:3px 6px;min-width:180px;max-width:180px;font-size:13px;border-right:2px solid #999}
.sch-table td.task-name:hover{background:#e3f2fd}
.sch-table td.task-days{position:sticky;left:180px;z-index:5;background:#fff;min-width:55px;font-size:12px;padding:2px 4px;text-align:right}
.sch-table td.task-amount{position:sticky;left:235px;z-index:5;background:#fff;min-width:60px;font-size:12px;padding:2px 4px;text-align:right}
.sch-table td.task-kouki{position:sticky;left:295px;z-index:5;background:#fff;min-width:35px;font-size:13px;font-weight:700;color:var(--nav)}
.sch-table td.task-note{position:sticky;left:330px;z-index:5;background:#fff;min-width:100px;max-width:100px;font-size:12px;text-align:left;padding:2px 6px;border-right:2px solid #999;overflow:hidden;text-overflow:ellipsis}
.sch-table td.day{width:28px;min-width:28px;height:30px;cursor:crosshair;padding:0;position:relative}
.sch-table td.day.sat{background:#f5f8ff}.sch-table td.day.sun,.sch-table td.day.hol{background:#fff5f5}
.sch-table td.day .bar{position:absolute;inset:2px 0;border-radius:2px}
/* 範囲選択印刷モード */
.sch-wrap.sel-mode td.day{cursor:cell}
.sch-table td.day.sel-hi::after{content:'';position:absolute;inset:0;background:rgba(230,81,0,.35);pointer-events:none;z-index:2}
.col-resizer{position:absolute;top:0;right:0;bottom:0;width:8px;cursor:col-resize;z-index:11;background:transparent;border-right:2px solid transparent}
.col-resizer:hover{background:rgba(255,235,59,.4);border-right-color:#ffeb3b}
.col-resizer.dragging{background:rgba(255,235,59,.7);border-right-color:#ffeb3b}
.popup-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center}
.popup{background:#fff;border-radius:14px;padding:20px;width:90%;max-width:440px;box-shadow:0 8px 40px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.popup h3{font-size:15px;color:var(--nav);margin-bottom:12px}
.popup .fg{margin-bottom:10px}
.popup .fg label{display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:3px}
.popup .fg input,.popup .fg select,.popup .fg textarea{width:100%;padding:8px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit}
.popup .btns{display:flex;gap:8px;margin-top:12px}
.popup .btns button{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.popup-section-title{font-size:11px;font-weight:700;color:#555;margin:0 0 6px;padding-bottom:4px;border-bottom:1px solid #eee}
.color-grid{display:flex;gap:4px;flex-wrap:wrap}
.color-grid .co{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent}
.color-grid .co.on{border-color:#333;box-shadow:0 0 0 2px #fff,0 0 0 4px #333}
/* 請求可能カード（画面表示） */
.bill-card{background:#fff;border:1.5px solid #e0e0e0;border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.bill-card.b-done{border-left:6px solid #e53935}
.bill-card.b-deki{border-left:6px solid #1565c0;background:#f5f9ff}
.bill-card.b-billed{opacity:.55;border-left:6px solid #2e7d32}
.bill-card .bc-name{font-weight:700;font-size:14px;flex:1;min-width:150px}
.bill-card.b-done .bc-name{color:#c62828}
.bill-card.b-deki .bc-name{color:#0d47a1}
.bill-card .bc-info{font-size:11px;color:#888;width:100%}
.drag-hint{font-size:10px;color:#888;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.drag-hint span{font-size:13px}
@media print{
.hdr,.toolbar,.legend,.tabs,.no-print,.action-btns,.col-resizer{display:none!important}
.sch-wrap{max-height:none!important;overflow:visible!important}
.panel{display:none!important}
.panel.on{display:block!important}
body{background:#fff!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
.sch-table th,.sch-table td{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
.sch-table th{position:static!important}
.sch-table td.task-name,.sch-table td.task-days,.sch-table td.task-amount,.sch-table td.task-kouki,.sch-table td.task-note{position:static!important}
.sch-table td.day .bar{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
/* テーブル高さを印刷可能領域いっぱいに固定（行が多ければ自動で複数ページ） */
.sch-table{font-size:var(--p-fs,8px)!important;height:285mm!important}
.sch-table th.day-num{min-width:16px!important;width:16px!important;font-size:7px!important;padding:1px!important}
.sch-table th.dow{font-size:6px!important;height:12px!important}
.sch-table td.day{width:16px!important;min-width:16px!important;height:var(--p-row-h,18px)!important}
.sch-table td.task-name{min-width:140px!important;max-width:140px!important;font-size:var(--p-fs,8px)!important}
.sch-table td.task-days{min-width:45px!important;font-size:var(--p-fs,8px)!important}
.sch-table td.task-amount{min-width:50px!important;font-size:var(--p-fs,8px)!important}
.sch-table td.task-kouki{min-width:35px!important;font-size:var(--p-fs,8px)!important}
.sch-table td.task-note{min-width:65px!important;max-width:65px!important;font-size:calc(var(--p-fs,8px) - 1px)!important}
/* === 請求可能タブ印刷時：グリッドで1ページに最適化 === */
#p-bill{padding:0!important;margin:0!important}
#p-bill > div:first-child{font-size:calc(16px * var(--bill-font-scale,1))!important;padding:0 0 4px!important;border-bottom:2px solid #333;margin-bottom:6px!important;font-weight:700;color:#000!important}
#billList{display:grid!important;grid-template-columns:repeat(var(--bill-cols,2),1fr)!important;gap:3px!important;padding:0!important;align-content:start}
#billList .group-hdr{grid-column:1 / -1!important;font-size:calc(11px * var(--bill-font-scale,1))!important;font-weight:700;padding:3px 4px 2px!important;margin:2px 0 1px!important;border-bottom:1px solid #999;display:flex!important;align-items:center;gap:6px}
.bill-card{break-inside:avoid!important;page-break-inside:avoid!important;border:1px solid #999!important;border-left-width:4px!important;padding:3px 6px!important;margin:0!important;box-shadow:none!important;display:block!important;background:#fff!important;border-radius:3px!important;opacity:1!important}
.bill-card.b-done{border-left:4px solid var(--c-done,#e53935)!important}
.bill-card.b-deki{border-left:4px solid var(--c-deki,#1565c0)!important;background:#fafcff!important}
.bill-card.b-billed{border-left:4px solid #2e7d32!important;text-decoration:line-through}
.bill-card .bc-name{font-size:calc(10px * var(--bill-font-scale,1))!important;line-height:1.2;flex:none!important;width:100%!important;min-width:0!important;margin:0 0 1px}
.bill-card .bc-info{font-size:calc(8px * var(--bill-font-scale,1))!important;line-height:1.2;width:100%!important;color:#444!important}
.bill-card button{display:none!important}
.bill-card > div[style*="display:flex;gap:6px"]{display:none!important}
@page{size:A3 landscape;margin:5mm}
}
</style>
</head>
<body>
<div class="hdr">
<h1><img src="logo_name.jpg" alt="株式会社アイル" title="株式会社アイル" style="height:30px;background:#fff;border-radius:6px;padding:2px 5px;vertical-align:middle;margin-right:8px" onerror="this.style.display='none'">工 程 管 理 表</h1>
<div class="hdr-btns">
<button onclick="printCurrent()" title="印刷（現在のタブ）"><span class="hb-icon">🖨️</span><span class="hb-label">印刷</span></button>
<button onclick="exportBk()" title="バックアップ保存（JSONダウンロード）"><span class="hb-icon">💾</span><span class="hb-label">BK保存</span></button>
<button onclick="document.getElementById('bkFile').click()" title="バックアップ復元（JSON読込）"><span class="hb-icon">📥</span><span class="hb-label">BK復元</span></button>
<input type="file" id="bkFile" accept=".json" style="display:none" onchange="importBk(this)">
</div>
</div>
<div class="tabs">
<div class="tab on" onclick="swTab('sch')">📋 工程表</div>
<div class="tab" onclick="swTab('bill')">💰 請求可能 <span id="billBadge" style="background:#e53935;color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;margin-left:4px"></span></div>
</div>
<div id="p-sch" class="panel on">
<div class="legend" id="legendBar"></div>
<div class="toolbar">
<input type="month" id="startMonth" onchange="render()">
<select id="monthCount" onchange="render()">
<option value="1">1ヶ月</option><option value="2" selected>2ヶ月</option><option value="3">3ヶ月</option>
<option value="6">6ヶ月</option><option value="12">1年</option>
</select>
<button class="btn-g" onclick="addTask()">＋ 現場追加</button>
<button class="btn-b" onclick="addTeam()">＋ 班追加</button>
<button class="btn-o" onclick="openHolPop()">🏠 休日</button>
<button class="btn-x" onclick="openColPop()">⚙ 設定</button>
<select id="paintTeam" style="min-width:100px"><option value="">— 塗り班 —</option></select>
<div class="drag-hint">
<span>→</span>塗り <span>←</span>消し <span>⇆</span>列幅 <span>🖱️</span>中ボタン=スクロール
</div>
</div>
<div class="sch-wrap" id="schWrap"><table class="sch-table" id="schTable"></table></div>
</div>
<div id="p-bill" class="panel">
<div style="padding:16px 16px 8px;font-size:15px;font-weight:700;color:var(--nav)">💰 請求可能現場</div>
<div style="padding:0 16px" id="billList"></div>
</div>
<div class="popup-ov" id="taskPop" style="display:none" onclick="if(event.target===this)this.style.display='none'">
<div class="popup">
<h3 id="taskPopTitle">現場の追加</h3>
<div class="fg"><label>現場名 *</label><input type="text" id="tp_name" lang="ja" style="ime-mode:active" onkeydown="if(event.key==='Enter'&&!event.isComposing){event.preventDefault();document.getElementById('tp_days').focus();}"></div>
<div class="fg"><label>土量（㎥）</label><input type="number" id="tp_days" lang="ja" style="ime-mode:active" placeholder="例: 58" inputmode="decimal" onkeydown="if(event.key==='Enter'&&!event.isComposing){event.preventDefault();document.getElementById('tp_amount').focus();}"></div>
<div class="fg"><label>金額（万円）</label><input type="number" id="tp_amount" lang="ja" style="ime-mode:active" placeholder="例: 142" inputmode="decimal" onkeydown="if(event.key==='Enter'&&!event.isComposing){event.preventDefault();document.getElementById('tp_note').focus();}"></div>
<div class="fg"><label>備考</label><input type="text" id="tp_note" lang="ja" style="ime-mode:active" placeholder="例: 3月中旬〜" onkeydown="if(event.key==='Enter'&&!event.isComposing){event.preventDefault();saveTask();}"></div>
<div class="btns">
<button class="btn-x" onclick="document.getElementById('taskPop').style.display='none'">キャンセル</button>
<button class="btn-g" onclick="saveTask()">💾 保存</button>
</div>
<div id="tp_del" style="text-align:center;margin-top:8px"></div>
</div>
</div>
<div class="popup-ov" id="teamPop" style="display:none" onclick="if(event.target===this)this.style.display='none'">
<div class="popup">
<h3>班の追加・編集</h3>
<div class="fg"><label>班名 *</label><input type="text" id="tm_name"></div>
<div class="fg"><label>色</label><div class="color-grid" id="tm_colors"></div></div>
<div class="btns">
<button class="btn-x" onclick="document.getElementById('teamPop').style.display='none'">キャンセル</button>
<button class="btn-b" onclick="saveTeam()">💾 保存</button>
</div>
<div id="tm_del" style="text-align:center;margin-top:8px"></div>
</div>
</div>
<div class="popup-ov" id="holPop" style="display:none" onclick="if(event.target===this)this.style.display='none'">
<div class="popup">
<h3>🏠 会社指定休日</h3>
<div style="display:flex;gap:6px;margin-bottom:10px">
<input type="date" id="hol_date" style="flex:1;padding:8px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit">
<button class="btn-o" onclick="addCompHol()">追加</button>
</div>
<div style="display:flex;gap:6px;margin-bottom:10px;font-size:11px;color:#888;align-items:center">
<span>範囲:</span>
<input type="date" id="hol_from" style="padding:5px;border:1px solid #ddd;border-radius:6px;font-size:11px;font-family:inherit">
<span>〜</span>
<input type="date" id="hol_to" style="padding:5px;border:1px solid #ddd;border-radius:6px;font-size:11px;font-family:inherit">
<button class="btn-o" style="font-size:10px;padding:5px 10px" onclick="addCompHolRange()">一括追加</button>
</div>
<div id="holList" style="max-height:300px;overflow-y:auto"></div>
<div class="btns" style="margin-top:10px">
<button class="btn-x" onclick="document.getElementById('holPop').style.display='none';render()">閉じる</button>
</div>
</div>
</div>
<div class="popup-ov" id="printPop" style="display:none" onclick="if(event.target===this)this.style.display='none'">
<div class="popup" style="max-width:380px">
<h3>🖨️ 印刷</h3>
<button onclick="printAll()" style="display:block;width:100%;padding:16px;margin-bottom:10px;border:none;border-radius:10px;background:#1565c0;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-align:left">📄 全体を印刷<br><span style="font-size:11px;font-weight:400;opacity:.85">いま表示している期間・全現場を用紙いっぱいに印刷</span></button>
<button onclick="startSelectMode()" style="display:block;width:100%;padding:16px;margin-bottom:10px;border:none;border-radius:10px;background:#e65100;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-align:left">🖱️ 範囲を選んで印刷<br><span style="font-size:11px;font-weight:400;opacity:.85">表の上をマウスでドラッグして、印刷したい現場と日付の範囲を選択</span></button>
<div class="btns">
<button class="btn-x" onclick="document.getElementById('printPop').style.display='none'">キャンセル</button>
</div>
</div>
</div>
<div id="selHint" class="no-print" style="display:none;position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:400;background:#e65100;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,.35);align-items:center;gap:14px">
<span>🖱️ 印刷したい範囲をドラッグで選択してください</span>
<button onclick="endSelectMode()" style="background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.6);color:#fff;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">中止</button>
</div>
<div class="popup-ov" id="selConfirmPop" style="display:none" onclick="if(event.target===this)selRetry()">
<div class="popup" style="max-width:360px">
<h3>🖨️ 選択範囲を印刷</h3>
<div id="selSummary" style="font-size:15px;font-weight:700;margin-bottom:14px;text-align:center;color:#e65100"></div>
<div class="btns">
<button class="btn-x" onclick="selRetry()">選び直す</button>
<button class="btn-b" onclick="doSelPrint()">🖨️ 印刷する</button>
</div>
<div style="text-align:center;margin-top:8px"><button onclick="selCancel()" style="background:none;border:none;color:#888;cursor:pointer;font-size:12px;padding:6px;font-family:inherit">中止する</button></div>
</div>
</div>
<div class="popup-ov" id="colPop" style="display:none" onclick="if(event.target===this)this.style.display='none'">
<div class="popup">
<h3>⚙ 設定</h3>
<div class="popup-section-title">列幅（px）</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
<div class="fg"><label>現場名</label><input type="number" id="cw_name" min="80" max="400" step="10"></div>
<div class="fg"><label>土量</label><input type="number" id="cw_days" min="30" max="200" step="5"></div>

<script>
const COLORS=['#4CAF50','#2196F3','#FF9800','#9C27B0','#F44336','#00BCD4','#FF5722','#3F51B5','#8BC34A','#E91E63','#009688','#FFC107','#673AB7','#795548','#607D8B','#CDDC39'];
const DOW=['日','月','火','水','木','金','土'];
const uid=()=>'_'+Math.random().toString(36).slice(2,10);
let D={info:{},teams:[],tasks:[],bars:{},companyHolidays:[]};
const defCW={name:180,days:55,amount:60,kouki:35,note:100,day:28};
const minCW={name:80,days:30,amount:30,kouki:25,note:50,day:16};
function getCW(){return Object.assign({},defCW,D.colWidths||{});}
const defSC={completed:'#e53935',dekidaka:'#1565c0'};
function getSC(){return Object.assign({},defSC,D.statusColors||{});}
const SK='kouji_schedule';
function ld(){try{const d=localStorage.getItem(SK);if(d)D=JSON.parse(d);}catch(e){}}
function sv(){try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){}if(window._fbSvSch)window._fbSvSch();}
// 祝日判定
function getHolidays(year){
const h={};
function add(m,d){h[`${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`]=true;}
function nthMon(m,n){let c=0;for(let d=1;d<=31;d++){if(new Date(year,m-1,d).getDay()===1){c++;if(c===n){add(m,d);return d;}}}return 0;}
add(1,1);add(2,11);add(2,23);add(4,29);add(5,3);add(5,4);add(5,5);add(8,11);add(11,3);add(11,23);
nthMon(1,2);nthMon(7,3);nthMon(9,3);nthMon(10,2);
const sE=Math.floor(20.8431+0.242194*(year-1980)-Math.floor((year-1980)/4));
add(3,sE);
const aE=Math.floor(23.2488+0.242194*(year-1980)-Math.floor((year-1980)/4));
add(9,aE);
Object.keys(h).forEach(ds=>{
const d=new Date(ds);
if(d.getDay()===0){
const next=new Date(d);next.setDate(next.getDate()+1);
const ns=next.toISOString().slice(0,10);
if(!h[ns])h[ns]=true;
}
});
return h;
}
let holidayCache={};
function isHoliday(ds){
const y=parseInt(ds.slice(0,4));
if(!holidayCache[y])holidayCache[y]=getHolidays(y);
return !!holidayCache[y][ds];
}
function isCompHol(ds){return (D.companyHolidays||[]).includes(ds);}
function swTab(t){document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',i===(t==='sch'?0:1)));document.getElementById('p-sch').classList.toggle('on',t==='sch');document.getElementById('p-bill').classList.toggle('on',t==='bill');if(t==='bill')renderBillable();}
function renderLegend(){const el=document.getElementById('legendBar');el.innerHTML=D.teams.map(t=>`<div class="legend-item" onclick="editTeam('${t.id}')"><div class="dot" style="background:${t.color}"></div><span>${t.name}</span></div>`).join('')+`<div class="legend-add" onclick="addTeam()">＋ 班追加</div>`;const ps=document.getElementById('paintTeam');const cv=ps.value;ps.innerHTML='<option value="">— 塗り班 —</option>'+D.teams.map(t=>`<option value="${t.id}" style="color:${t.color}"${t.id===cv?' selected':''}>${t.name}</option>`).join('');}
function getDays(y,m){return new Date(y,m+1,0).getDate();}
function escAttr(s){return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function render(){
const sm=document.getElementById('startMonth').value;if(!sm)return;
const mc=parseInt(document.getElementById('monthCount').value);
const today=new Date().toISOString().slice(0,10);
/* 表示する日付範囲を決定（選択範囲印刷時は printOverride が優先） */
let dFrom,dTo;
if(printOverride){dFrom=printOverride.from;dTo=printOverride.to;}
else{
const [sy,smm]=sm.split('-').map(Number);
dFrom=`${sy}-${String(smm).padStart(2,'0')}-01`;
let ey=sy,em=smm-1+mc-1;while(em>11){em-=12;ey++;}
dTo=`${ey}-${String(em+1).padStart(2,'0')}-${String(getDays(ey,em)).padStart(2,'0')}`;
}
const months=[];
const cur=new Date(dFrom+'T00:00:00'),end=new Date(dTo+'T00:00:00');
let mo=null;
while(cur<=end){
const y=cur.getFullYear(),m=cur.getMonth(),d=cur.getDate();
if(!mo||mo.y!==y||mo.m!==m){mo={y,m,label:`${y}年 ${m+1}月`,days:[]};months.push(mo);}
const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const dow=cur.getDay(),hol=isHoliday(ds),chol=isCompHol(ds);
mo.days.push({d,ds,dow,sat:dow===6,sun:dow===0,hol,chol,today:ds===today});
cur.setDate(d+1);
}
const active=printOverride?D.tasks.filter(t=>!t.billed&&printOverride.ids.has(t.id)):D.tasks.filter(t=>!t.billed);
const w=getCW();const sc=getSC();const totalLeft=w.name+w.days+w.amount+w.kouki+w.note;
let h='<thead><tr><th colspan="5" class="top-left" style="min-width:'+totalLeft+'px"></th>';
months.forEach(mo=>{h+=`<th class="month-hdr" colspan="${mo.days.length}">${mo.label}</th>`;});h+='</tr>';
h+=`<tr>
<th class="left-hdr" data-col="name" style="min-width:${w.name}px">現場名<div class="col-resizer" data-col="name"></div></th>
<th class="left-hdr" data-col="days" style="min-width:${w.days}px">土量<div class="col-resizer" data-col="days"></div></th>
<th class="left-hdr" data-col="amount" style="min-width:${w.amount}px">金額<div class="col-resizer" data-col="amount"></div></th>
<th class="left-hdr" data-col="kouki" style="min-width:${w.kouki}px">工期<div class="col-resizer" data-col="kouki"></div></th>
<th class="left-hdr" data-col="note" style="min-width:${w.note}px">備考<div class="col-resizer" data-col="note"></div></th>`;
months.forEach(mo=>{mo.days.forEach(d=>{const cls=d.today?' today':d.sun||d.hol||d.chol?' sun':d.sat?' sat':'';h+=`<th class="day-num${cls}">${d.d}</th>`;});});h+='</tr>';
h+='<tr><th colspan="5" class="top-left" style="font-size:8px"></th>';
months.forEach(mo=>{mo.days.forEach(d=>{const cls=d.sun||d.hol||d.chol?' sun':d.sat?' sat':'';h+=`<th class="dow${cls}">${DOW[d.dow]}</th>`;});});h+='</tr></thead><tbody>';
active.forEach(task=>{
const paintedDays=Object.keys(D.bars[task.id]||{}).length;
const nameClass=task.completed?'s-done':(task.dekidaka?'s-deki':'');
const nameInlineColor=task.completed?`color:${sc.completed}`:(task.dekidaka?`color:${sc.dekidaka}`:'');
const nameStyle=nameInlineColor?`${nameInlineColor};font-weight:700`:'';
h+=`<tr><td class="task-name">`;
h+=`<span class="task-name-text ${nameClass}" style="${nameStyle}" onclick="inlineEdit('${task.id}','name',this)">${task.name||''}</span>`;
h+=`<span class="action-btns no-print">`;
h+=`<button class="btn-done${task.completed?' on':''}" onclick="event.stopPropagation();completeTask('${task.id}')" title="${task.completed?'完了を解除':'完了にする（赤）'}">完了</button>`;
h+=`<button class="btn-deki${task.dekidaka?' on':''}" onclick="event.stopPropagation();dekidakaTask('${task.id}')" title="${task.dekidaka?'出来高を解除':'出来高にする（青）'}">出来高</button>`;
h+=`<button class="btn-del" onclick="event.stopPropagation();delTask('${task.id}')" title="削除">×</button>`;
h+=`</span></td>`;
h+=`<td class="task-days" onclick="inlineEdit('${task.id}','days',this)" style="cursor:pointer">${task.days?task.days+'㎥':''}</td>`;
h+=`<td class="task-amount" onclick="inlineEdit('${task.id}','amount',this)" style="cursor:pointer">${task.amount?task.amount+'万':''}</td>`;
h+=`<td class="task-kouki">${paintedDays||''}</td>`;
h+=`<td class="task-note" onclick="inlineEdit('${task.id}','note',this)" style="cursor:pointer" title="${escAttr(task.note)}">${task.note||''}</td>`;
months.forEach(mo=>{mo.days.forEach(d=>{const bars=D.bars[task.id]||{};const tid=bars[d.ds];const team=tid?D.teams.find(t=>t.id===tid):null;const cls=d.sun||d.hol||d.chol?' sun':d.sat?' sat':'';const isSun=d.sun?1:0;h+=`<td class="day${cls}" data-tid="${task.id}" data-ds="${d.ds}" data-sun="${isSun}">${team?'<div class="bar" style="background:'+team.color+'"></div>':''}</td>`;});});
h+='</tr>';
});
if(!active.length){const td=months.reduce((a,m)=>a+m.days.length,0);h+=`<tr><td colspan="${5+td}" style="text-align:center;padding:20px;color:#aaa;cursor:pointer" onclick="addTask()">＋ 現場を追加</td></tr>`;}
h+='</tbody>';document.getElementById('schTable').innerHTML=h;updateBadge();if(typeof syncHeaders==='function')syncHeaders();
}
// ダブルクリック: 塗り/消しトグル
document.addEventListener('dblclick',e=>{
if(selMode)return;
const td=e.target.closest('td.day');if(!td)return;
const tid=td.dataset.tid,ds=td.dataset.ds;if(!tid)return;
const teamId=document.getElementById('paintTeam').value;
if(!D.bars[tid])D.bars[tid]={};
if(D.bars[tid][ds]){delete D.bars[tid][ds];}
else{if(!teamId){alert('塗り班を選択してください');return;}D.bars[tid][ds]=teamId;}
sv();render();
});

/* 列幅マウスドラッグでリサイズ */
let resizeState=null;
document.addEventListener('mousedown',e=>{
if(e.button!==0)return;
const rh=e.target.closest('.col-resizer');
if(!rh)return;
e.preventDefault();e.stopPropagation();
const col=rh.dataset.col;
const w=getCW();
resizeState={col,sx:e.clientX,sw:w[col],rh};
rh.classList.add('dragging');
document.body.style.cursor='col-resize';
},true);

/* ミドルクリックドラッグでスクロール */
let mDrag=null;
document.addEventListener('mousedown',e=>{
if(e.button!==1)return;
const wrap=e.target.closest('.sch-wrap');
if(!wrap)return;
e.preventDefault();e.stopPropagation();
mDrag={wrap,sx:e.clientX,sy:e.clientY,sl:wrap.scrollLeft,st:wrap.scrollTop};
wrap.classList.add('middle-dragging');
},true);
document.addEventListener('auxclick',e=>{if(e.button===1)e.preventDefault();});

/* 塗り/消しドラッグ */
let dragState=null;
document.addEventListener('mousedown',e=>{
if(e.button!==0)return;
if(resizeState||mDrag)return;
const td=e.target.closest('td.day');if(!td)return;
e.preventDefault();
if(selMode){selAnchor={td};selRect=null;updateSelRect(td);return;}
const tid=td.dataset.tid;if(!tid)return;
const teamId=document.getElementById('paintTeam').value;
dragState={startX:e.clientX,teamId,tid};
});
document.addEventListener('mousemove',e=>{
if(resizeState){
e.preventDefault();
const min=minCW[resizeState.col]||30;
const nw=Math.max(min,resizeState.sw+(e.clientX-resizeState.sx));
if(!D.colWidths)D.colWidths={};
D.colWidths[resizeState.col]=nw;
applyCW();
const th=document.querySelector(`th.left-hdr[data-col="${resizeState.col}"]`);
if(th)th.style.minWidth=nw+'px';
document.querySelectorAll('.sch-table th.top-left').forEach(el=>{const w=getCW();el.style.minWidth=(w.name+w.days+w.amount+w.kouki+w.note)+'px';});
return;
}
if(mDrag){
e.preventDefault();
mDrag.wrap.scrollLeft=mDrag.sl-(e.clientX-mDrag.sx);
mDrag.wrap.scrollTop=mDrag.st-(e.clientY-mDrag.sy);
return;
}
if(selMode){
if(!selAnchor)return;
const td=e.target.closest('td.day');if(!td)return;
updateSelRect(td);
return;
}
if(!dragState)return;
const td=e.target.closest('td.day');if(!td)return;
const tid=td.dataset.tid,ds=td.dataset.ds;if(!tid||tid!==dragState.tid)return;
const dx=e.clientX-dragState.startX;
if(dx>5){
if(!dragState.teamId)return;
const isSun=td.dataset.sun==='1';
if(isSun)return;
if(!D.bars[tid])D.bars[tid]={};
D.bars[tid][ds]=dragState.teamId;
sv();render();
}else if(dx<-5){
if(D.bars[tid])delete D.bars[tid][ds];
sv();render();
}
});
document.addEventListener('mouseup',e=>{
if(resizeState){
if(resizeState.rh)resizeState.rh.classList.remove('dragging');
document.body.style.cursor='';
sv();render();
resizeState=null;
return;
}
if(mDrag){
mDrag.wrap.classList.remove('middle-dragging');
mDrag=null;
return;
}
if(selMode){
if(selAnchor&&selRect)openSelConfirm();
selAnchor=null;
return;
}
dragState=null;
});

/* === ② 請求可能 - 出来高セクション追加 + 色付け === */
function renderBillable(){
const el=document.getElementById('billList');
const sc=getSC();
const comp=D.tasks.filter(t=>t.completed&&!t.billed);
const deki=D.tasks.filter(t=>t.dekidaka&&!t.completed&&!t.billed);
const done=D.tasks.filter(t=>t.billed);
if(!comp.length&&!deki.length&&!done.length){
el.innerHTML='<div style="text-align:center;padding:40px;color:#aaa">請求可能な現場はありません</div>';
return;
}
/* 色をCSS変数にセット（印刷でも使えるように） */
document.documentElement.style.setProperty('--c-done',sc.completed);
document.documentElement.style.setProperty('--c-deki',sc.dekidaka);
let h='';
if(comp.length){
h+=`<div class="group-hdr" style="font-size:13px;font-weight:700;color:${sc.completed};margin-bottom:8px;display:flex;align-items:center;gap:8px">
<span style="display:inline-block;width:14px;height:14px;background:${sc.completed};border-radius:3px"></span>
📋 完了・請求可能（${comp.length}件）
</div>`;
comp.forEach(t=>{h+=`<div class="bill-card b-done">
<div class="bc-name">${t.name||''}</div>
<div style="display:flex;gap:6px" class="no-print">
<button onclick="uncompleteTask('${t.id}')" style="background:#1565c0;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit">↩ 戻す</button>
<button onclick="billTask('${t.id}')" style="background:#2e7d32;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">✅ 請求完了</button>
</div>
<div class="bc-info">${t.days?'土量:'+t.days+'㎥':''}${t.amount?' ／ 金額:'+t.amount+'万':''}${t.note?' ／ '+t.note:''}</div>
</div>`;});
}
if(deki.length){
h+=`<div class="group-hdr" style="font-size:13px;font-weight:700;color:${sc.dekidaka};margin:14px 0 8px;display:flex;align-items:center;gap:8px">
<span style="display:inline-block;width:14px;height:14px;background:${sc.dekidaka};border-radius:3px"></span>
📐 出来高（${deki.length}件）
</div>`;
deki.forEach(t=>{h+=`<div class="bill-card b-deki">
<div class="bc-name">${t.name||''}</div>
<div style="display:flex;gap:6px" class="no-print">
<button onclick="dekidakaTask('${t.id}')" style="background:#1565c0;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit">↩ 戻す</button>
<button onclick="completeTask('${t.id}')" style="background:#c62828;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">完了に変更</button>
</div>
<div class="bc-info">${t.days?'土量:'+t.days+'㎥':''}${t.amount?' ／ 金額:'+t.amount+'万':''}${t.note?' ／ '+t.note:''}</div>
</div>`;});
}
if(done.length){
h+=`<div class="group-hdr" style="font-size:13px;font-weight:700;color:#2e7d32;margin:14px 0 8px;display:flex;align-items:center;gap:8px">
<span style="display:inline-block;width:14px;height:14px;background:#2e7d32;border-radius:3px"></span>
✅ 請求済（${done.length}件）
</div>`;
done.forEach(t=>{h+=`<div class="bill-card b-billed">
<div class="bc-name" style="text-decoration:line-through">${t.name||''}</div>
<button onclick="unbillTask('${t.id}')" class="no-print" style="background:#1565c0;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit">↩ 戻す</button>
<div class="bc-info">${t.days?'土量:'+t.days+'㎥':''}${t.amount?' ／ 金額:'+t.amount+'万':''}${t.note?' ／ '+t.note:''}</div>
</div>`;});
}
el.innerHTML=h;
}

/* === ② 印刷時に1ページ最適化（カード数に応じてグリッド・フォントを自動調整） === */
function optimizeBillPrint(){
const billOn=document.getElementById('p-bill').classList.contains('on');
if(!billOn)return;
/* 出来高・完了・請求済を含めた全カード数 */
const cards=document.querySelectorAll('#billList .bill-card').length;
const groups=document.querySelectorAll('#billList .group-hdr').length;
let cols,fs;
/* A3横で何列・何倍のフォントサイズが1ページに収まるか経験則で決定 */
if(cards<=4){cols=1;fs=1.6;}
else if(cards<=8){cols=2;fs=1.5;}
else if(cards<=14){cols=2;fs=1.25;}
else if(cards<=22){cols=3;fs=1.1;}
else if(cards<=32){cols=3;fs=0.95;}
else if(cards<=48){cols=4;fs=0.85;}
else if(cards<=64){cols=4;fs=0.75;}
else if(cards<=90){cols=5;fs=0.7;}
else{cols=6;fs=0.6;}
document.documentElement.style.setProperty('--bill-cols',cols);
document.documentElement.style.setProperty('--bill-font-scale',fs);
}
window.addEventListener('beforeprint',optimizeBillPrint);

/* === 工程表の印刷：マウス範囲選択印刷 + 用紙いっぱいに縦拡大 === */
let printOverride=null;
let selMode=false,selAnchor=null,selRect=null,selIds=[];
function printCurrent(){
if(document.getElementById('p-bill').classList.contains('on')){window.print();return;}
if(!D.tasks.filter(t=>!t.billed).length){alert('印刷する現場がありません');return;}
document.getElementById('printPop').style.display='flex';
}
function printAll(){
document.getElementById('printPop').style.display='none';
setTimeout(()=>window.print(),50);
}
function startSelectMode(){
document.getElementById('printPop').style.display='none';
selMode=true;selAnchor=null;selRect=null;
document.getElementById('selHint').style.display='flex';
document.getElementById('schWrap').classList.add('sel-mode');
}
function endSelectMode(){
selMode=false;selAnchor=null;selRect=null;
document.getElementById('selHint').style.display='none';
document.getElementById('schWrap').classList.remove('sel-mode');
clearSelHi();
}
function clearSelHi(){document.querySelectorAll('.sel-hi').forEach(el=>el.classList.remove('sel-hi'));}
function cellPos(td){
const rows=Array.from(document.querySelectorAll('#schTable tbody tr'));
return {row:rows.indexOf(td.parentElement),ds:td.dataset.ds};
}
function updateSelRect(td){
const a=cellPos(selAnchor.td),b=cellPos(td);
if(a.row<0||b.row<0)return;
const r1=Math.min(a.row,b.row),r2=Math.max(a.row,b.row);
const d1=a.ds<b.ds?a.ds:b.ds,d2=a.ds<b.ds?b.ds:a.ds;
selRect={r1,r2,d1,d2};
clearSelHi();

/* Ctrl+P・全体印刷・選択印刷すべて：行数からA3横の高さいっぱいになるよう行高・文字サイズを計算 */
window.addEventListener('beforeprint',()=>{
if(!document.getElementById('p-sch').classList.contains('on'))return;
const rows=Array.from(document.querySelectorAll('#schTable tbody tr')).filter(tr=>tr.querySelector('td.day')).length;

function fitPrintHeight(n){
const availMM=272;/* 297mm - 余白10mm - ヘッダー約15mm */
const rowMM=Math.max(4.2,availMM/n);
const rowPx=rowMM*3.78;
const fs=Math.min(18,Math.max(7,Math.round(rowPx*0.45)));
document.documentElement.style.setProperty('--p-row-h',Math.min(rowMM,45).toFixed(2)+'mm');
document.documentElement.style.setProperty('--p-fs',fs+'px');
}

function inlineEdit(taskId,field,el){
const t=D.tasks.find(t=>t.id===taskId);if(!t)return;
const cur=t[field]||'';
const isNum=field==='days'||field==='amount';
const unit=field==='days'?'㎥':field==='amount'?'万':'';
const inp=document.createElement('input');
inp.type=isNum?'number':'text';
inp.value=cur;
if(isNum)inp.inputMode='decimal';
inp.lang='ja';
inp.style.cssText='width:100%;padding:2px 4px;border:2px solid #1565c0;border-radius:4px;font-size:12px;background:#fff;color:#333;font-family:inherit;ime-mode:active';
const finish=()=>{const nv=inp.value;if(nv!==cur){t[field]=nv;sv();}render();};
inp.onblur=finish;
inp.onkeydown=e=>{if(e.key==='Enter'&&!e.isComposing){e.preventDefault();finish();}if(e.key==='Escape')render();};
if(field==='name'){el.textContent='';el.appendChild(inp);}
else{
const wrap=document.createElement('div');wrap.style.cssText='display:flex;align-items:center;gap:1px';
wrap.appendChild(inp);
if(unit){const u=document.createElement('span');u.textContent=unit;u.style.cssText='font-size:10px;color:#888;white-space:nowrap';wrap.appendChild(u);}
el.textContent='';el.appendChild(wrap);
}
inp.focus();inp.select();
}

/* === 横スクロール時に左ヘッダーをJSで本体と同期 === */
function syncHeaders(){

const sl=wrap.scrollLeft;
const els=wrap.querySelectorAll('.sch-table thead .left-hdr, .sch-table thead .top-left');
els.forEach(el=>{el.style.transform=`translate3d(${sl}px,0,0)`;});
}
/* 初期化時に1回バインド */
(function bindHeaderSync(){
function tryBind(){
const wrap=document.getElementById('schWrap');
if(!wrap){setTimeout(tryBind,100);return;}
let pending=false;
wrap.addEventListener('scroll',()=>{
if(pending)return;
pending=true;
requestAnimationFrame(()=>{syncHeaders();pending=false;});
},{passive:true});
syncHeaders();
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',tryBind);
else tryBind();
})();

function addCompHol(){
const ds=document.getElementById('hol_date').value;if(!ds)return;
if(!D.companyHolidays)D.companyHolidays=[];
if(!D.companyHolidays.includes(ds)){D.companyHolidays.push(ds);D.companyHolidays.sort();sv();}
renderHolList();
}
function addCompHolRange(){
const from=document.getElementById('hol_from').value;
const to=document.getElementById('hol_to').value;
if(!from||!to||from>to){alert('開始日と終了日を正しく入力');return;}
if(!D.companyHolidays)D.companyHolidays=[];
const d=new Date(from);const end=new Date(to);
while(d<=end){
const ds=d.toISOString().slice(0,10);
if(!D.companyHolidays.includes(ds))D.companyHolidays.push(ds);
d.setDate(d.getDate()+1);
}
D.companyHolidays.sort();sv();renderHolList();
}
function delCompHol(ds){D.companyHolidays=D.companyHolidays.filter(d=>d!==ds);sv();renderHolList();}
function renderHolList(){
const el=document.getElementById('holList');if(!el)return;
const hols=(D.companyHolidays||[]).slice();
if(!hols.length){el.innerHTML='<div style="color:#aaa;text-align:center;padding:12px">休日未登録</div>';return;}
const groups={};hols.forEach(ds=>{const ym=ds.slice(0,7);if(!groups[ym])groups[ym]=[];groups[ym].push(ds);});
let h='';
Object.keys(groups).sort().forEach(ym=>{
const [y,m]=ym.split('-');
h+=`<div style="font-weight:700;font-size:11px;color:var(--nav);margin:8px 0 4px">${y}年${parseInt(m)}月</div>`;
groups[ym].forEach(ds=>{
const d=new Date(ds);const dow=DOW[d.getDay()];
h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f0f0f0">
<span style="font-size:12px">${ds}（${dow}）</span>
<button onclick="delCompHol('${ds}')" style="background:none;border:none;color:#e53935;cursor:pointer;font-size:14px">×</button>
</div>`;
});
});
el.innerHTML=h;
}
